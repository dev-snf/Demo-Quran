
<!DOCTYPE html>
<html>
	<body>

	<p id="ayah">
	<span>Bismillahir</span>
	<span>Rahma</span>
	<span>Neer</span>
	<span>Rahim</span>
	</p>

	<audio id="audio" controls src="001001.mp3"></audio>

<style>
	span{padding:4px}
	.active{background:yellow;}
</style>

<script>
	const words=document.querySelectorAll("#ayah span");
	const audio=document.getElementById("audio");

const timing=[
	{start:0,end:1,word:0},
	{start:1,end:2,word:1},
	{start:2,end:3,word:2},
	{start:3,end:4,word:3}
];

audio.ontimeupdate=function(){
	let t=audio.currentTime;

		timing.forEach(w=>{
		if(t>=w.start && t<=w.end){
		words.forEach(x=>x.classList.remove("active"));
		words[w.word].classList.add("active");
		}
	});
};
</script>

</body>
</html>
